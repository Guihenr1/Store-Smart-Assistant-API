services:
  db:
    image: postgres:17
    container_name: smart-store-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartstoreuser
      POSTGRES_PASSWORD: sm4rtst0r3a1b2c3
      POSTGRES_DB: smartstoredb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartstoreuser -d smartstoredb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-store-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ENABLE_SCALAR=true
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTPS_PORT=
      - AUTO_MIGRATE=true
      - ASPNETCORE_Kestrel__Certificates__Default__Path=
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=smartstoredb;Username=smartstoreuser;Password=sm4rtst0r3a1b2c3
    ports:
      - "5077:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data: